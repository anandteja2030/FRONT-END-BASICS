<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM ELEMENTS</title>
</head>
<body>
    <h1>Form Elements</h1>
    <form action="/submit" method="post">
        <label for="username">Username :</label>
        <input type="text" size="20px" id="username" name="username" placeholder="Enter Username" required]>
        <br><br>

        <label for="email">Email :</label>
        <input type="email"  id="email" name="email" placeholder="Enter Email" >
        <br><br>

        <label for="password">Password :</label>
        <input type="password" name="password" id="password" placeholder="Enter Password" required>
        <br><br>

        <label> Gender : </label>
        <label for="maleradio">Male</label>
        <input type="radio" name="male" id="maleradio" value="Male">

        <label for="femaleradio"> Female</label>
        <input type="radio" name="Gender" id="femaleradio" value="Female">
        <br><br>

        <label> Programming Skills :</label> <br>
        <input type="checkbox" name="c" id="c" value="c">
        <label for="c"> C </label>
        <br>
        <input type="checkbox" name="java" id="java" value="java">
        <label for="java">Java</label>
        <br>
        <input type="checkbox" name="Python" id="python" value="Python">
        <label for="python">Python</label>
        <br>
        <input type="checkbox" name="c++" id="c++" value="c++">
        <label for="c++"> C++</label>

    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

@media(max-width:400px){

    .mobile{
        height: 100px;
        width: 100px;
        text-align: center;
        background-color: aqua;
    }
}

@media(min-width : 300px)and (max-width :800px){

    .tab{
        height: 100px;
        width: 100px;
        background-color:rgb(133, 204, 233);
        text-align: center;
    }
}
 
@media(min-width : 700px)and (max-width : 1700px){

    .laptop{
        height: 100px;
        width: 100px;
        background-color: pink;
        text-align: center;
    }
}
</style>

<body>
    <div class="mobile">
        Mobile
    </div>

    <div class="tab">
        Tab
    </div>

    <div class="laptop">
        Laptop
    </div>
</body>
</html>

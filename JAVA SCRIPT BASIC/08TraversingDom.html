<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Welcome To My Web</h1>

    <script>
        //created paragraph elemnet and added to inside the body using DOM traversing 
        const newele=document.createElement("p");
        document.body.appendChild(newele);
        newele.textContent="This is Created paragraph";
        newele.style.fontSize="2rem";
        newele.style.color="red";


    </script>
</body>
</html>

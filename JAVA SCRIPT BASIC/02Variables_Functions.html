<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <h1>Welcome To My Web</h1>
    <script>
        var a="Hello";
        var name="Anand !";
        console.log(a+""+name);
        document.write(a+" "+name);
        function fun(b){

        fun("Hi!");

        //Sample Addition Function
        function fun1(x,y){
            let res=x*y;
            document.write(res);
        }
        let x=Number(prompt("enter 1st num"));
        let y=Number(prompt("enter 2nd num"));
        fun1(x, y);

    </script>

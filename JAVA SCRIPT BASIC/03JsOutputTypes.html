<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1 id="name">Welcome To My Web</h1>

    <script>
        ele1=document.getElementById("name");
        document.write("before Changing the element Description :"+ele1.innerHTML);
        
        // innerHTML 
        var ele = document.getElementById("name");
        ele.innerHTML = "ANAND TEJA DASARI";
        document.write("After changing the Element Description :"+ele.innerHTML);

        // Document Write
        document.write("Written Using Docement.Write()");

        // Console Log 
        console.log(" This Message Displayed  in the js console");

        // Windows Alert 
        window.alert("Click on Ok to Continue");
         
         

    </script>
    
</body>
</html>

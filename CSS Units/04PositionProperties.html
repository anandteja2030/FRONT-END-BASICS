<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Ststic Position */
        .staticpos {
            position: static;
            top: 5000px;
            height: 200px;
            width: 275px;
        }

        /* Relative Position */
        .relativepos {
            position: relative;
            top: 200px;
            height: 200px;
            width: 275px;
        }

        /* Absolute Position */
        .absolutepos {
            position: absolute;
            display: inline;
            height: 200px;
            top: 3000px;
            width: 275px;
        }

        /* Fixed Position */
        .fixedpos {
            position: fixed;
            height: 3000px;
            top: 2000px;
            width: 300px;
        }

        /* Zindex Position */

        .zindexpos {
            z-index: -1;

        }
    </style>

</head>

<body>
    <h1>Static Position</h1>
    <br>
    <img class="staticpos" src="../HTML MEDIA/cv img.png" alt="">
    <br><br>

    <h1>Relative Position</h1>
    <br>
    <img class="relativepos" src="../HTML MEDIA/cv img.png" alt="">
    <br><br>

    <h1>Absolute Position</h1>
    <br>
    <img class="absolutepos" src="../HTML MEDIA/cv img.png" alt="">
    <br><br>

    <h1>Fixed Position</h1>
    <br>
    <img class="fixedpos" src="../HTML MEDIA/cv img.png" alt="">
    <br><br>

    <h1>Zindex Position</h1>
    <br>
    <img class="zindexpos" src="../HTML MEDIA/cv img.png" alt="">

</body>

</html>
